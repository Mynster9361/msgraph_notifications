<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Graph Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a; --card: #161b2a; --border: #242c40; --cyan: #00f2ff;
        }
        body { background: var(--bg); color: #cdd9e5; font-family: 'JetBrains Mono', monospace; }
        .syne { font-family: 'Syne', sans-serif; }
        .glass { background: var(--card); border: 1px solid var(--border); }
        .btn-tab { padding: 8px 20px; font-size: 11px; font-weight: bold; border: 1px solid var(--border); transition: 0.2s; }
        .btn-tab.active { background: var(--cyan); color: black; border-color: var(--cyan); }
        .path-tag { font-size: 9px; background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.2); color: var(--cyan); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
        <div>
            <h1 class="syne text-4xl uppercase italic text-white leading-none mb-2">GRAPH<span class="text-[var(--cyan)]">REGISTRY</span></h1>
            <p class="text-[10px] opacity-50 font-bold tracking-widest uppercase">Permission Explorer & History Tracker</p>
        </div>
        
        <div class="flex flex-col items-end gap-3 w-full md:w-auto">
            <div class="flex rounded-md overflow-hidden">
                <button id="tab-history" onclick="setView('history')" class="btn-tab active">HISTORY</button>
                <button id="tab-explorer" onclick="setView('explorer')" class="btn-tab">EXPLORER</button>
            </div>
            <input id="search" type="text" placeholder="Filter permissions..." class="w-full md:w-64 bg-[var(--card)] border border-[var(--border)] p-2 rounded text-xs outline-none focus:border-[var(--cyan)]">
        </div>
    </header>

    <main id="content" class="max-w-6xl mx-auto space-y-8">
        <div class="animate-pulse opacity-20 text-center py-20">Initializing Data Streams...</div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="glass max-w-2xl w-full rounded-xl overflow-hidden" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-[var(--border)] flex justify-between items-start">
                <h2 id="m-name" class="syne text-xl text-white break-all"></h2>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <div id="m-body" class="p-6 space-y-4 max-h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let history = [];
        let library = [];
        let view = 'history';

        async function init() {
            try {
                const [hData, lData] = await Promise.all([
                    fetch('data/changelog.json').then(r => r.json()),
                    fetch('data/current-state.json').then(r => r.json())
                ]);
                history = hData;
                library = lData;
                render();
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="text-red-400">Error loading data. Ensure 'data/current-state.json' exists.</div>`;
            }
        }

        function setView(v) {
            view = v;
            document.getElementById('tab-history').className = `btn-tab ${v === 'history' ? 'active' : ''}`;
            document.getElementById('tab-explorer').className = `btn-tab ${v === 'explorer' ? 'active' : ''}`;
            render();
        }

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('content');
            container.innerHTML = '';

            if (view === 'history') {
                const filtered = history.filter(i => i.name.toLowerCase().includes(query));
                const groups = filtered.reduce((acc, i) => { (acc[i.date] = acc[i.date] || []).push(i); return acc; }, {});
                
                Object.keys(groups).sort().reverse().forEach(date => {
                    let html = `<div class="space-y-4"><div class="flex items-center gap-4"><span class="text-[10px] font-bold opacity-30">${date}</span><div class="h-px flex-1 bg-[var(--border)]"></div></div>`;
                    groups[date].forEach(item => {
                        html += `<div onclick="showDetail('${item.name}')" class="glass p-4 rounded-lg cursor-pointer hover:border-[var(--cyan)] transition-colors">
                            <div class="text-[9px] text-[var(--cyan)] font-bold mb-1">NEW PERMISSION</div>
                            <div class="text-white font-bold">${item.name}</div>
                        </div>`;
                    });
                    container.innerHTML += html + '</div>';
                });
            } else {
                const filtered = library.filter(i => i.name.toLowerCase().includes(query) || (i.description && i.description.toLowerCase().includes(query)));
                let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
                filtered.sort((a,b) => a.name.localeCompare(b.name)).forEach(item => {
                    html += `<div onclick="showDetail('${item.name}', true)" class="glass p-4 rounded-lg cursor-pointer hover:border-[var(--cyan)] transition-all">
                        <div class="text-white font-bold text-sm truncate mb-1">${item.name}</div>
                        <div class="text-[10px] opacity-50 line-clamp-2 leading-relaxed">${item.description || 'No description provided.'}</div>
                    </div>`;
                });
                container.innerHTML = html + '</div>';
            }
        }

        function showDetail(name, fromLib = false) {
            const list = fromLib || view === 'explorer' ? library : history;
            const item = list.find(x => x.name === name);
            if (!item) return;

            document.getElementById('m-name').innerText = item.name;
            document.getElementById('m-body').innerHTML = `
                <div><div class="text-[10px] font-bold opacity-40 mb-2 uppercase">Description</div><p class="text-sm leading-relaxed">${item.description || 'N/A'}</p></div>
                <div><div class="text-[10px] font-bold opacity-40 mb-2 uppercase">Impacted API Paths (${item.paths?.length || 0})</div>
                <div class="flex flex-wrap gap-1">${(item.paths || []).map(p => `<span class="path-tag px-2 py-1 rounded">${p}</span>`).join('')}</div></div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        document.getElementById('search').addEventListener('input', render);
        init();
    </script>
</body>
</html>
